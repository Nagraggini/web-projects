# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # 1. Node.js környezet beállítása (igazából mégsem ezt használom)
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            # 2. Szükséges eszközök telepítése (ha nincs package.json, akkor is működik)
            - name: Install PostHTML
              run: npm install posthtml-cli posthtml-include

            # 3. A HTML fájlok összeállítása (Build)
            - name: Build HTML
              run: npx posthtml *.html -u posthtml-include -o dist/

            # 4. A saját komponenseid és stílusaid átmásolása
            - name: Copy assets
              run: |
                  # Létrehozzuk a célmappákat a biztonság kedvéért
                  mkdir -p dist/css dist/js dist/assets dist/components

                  # Átmásoljuk a saját forrásfájlokat (ha léteznek)
                  cp -rv css/* dist/css/ || echo "Nincs css mappa"
                  cp -rv js/* dist/js/ || echo "Nincs js mappa"
                  cp -rv assets/* dist/assets/ || echo "Nincs assets mappa"

                  # Bár a posthtml beilleszti a tartalmat, a képeket/egyebeket 
                  # a components mappából is érdemes átvinni, lásd a kövi sort.
                  cp -rv components/* dist/components/ || echo "Nincs components mappa"

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  # FONTOS: Most már nem a ".", hanem a "dist" mappát töltjük fel!
                  path: "dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
