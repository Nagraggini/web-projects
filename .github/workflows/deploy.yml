name: Deploy to GitHub Pages

on:
    push:
        branches: [main] # A fenti branch névvel egyeznie kell!

permissions: # Engedélyek: olvasás, írás meg a token írás, ha van.
    contents: read
    pages: write
    id-token: write

concurrency: # Erőforrás optimalizálása és a felesleges várakozás elkerülése.
    group: pages
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4 # Marketplace-ről: Letölti a kódot.

            - name: Set up Node
              uses: actions/setup-node@v4 # Marketplace-ről: Beállítja a Node.js-t.
              with:
                  node-version: 22 # Verziót csekkold le. LTS-t használj.
                  cache: "npm"

            - name: Install dependencies
              run: npm ci # Continuous Integration

            - name: Build all apps
              run: |
                  mkdir -p dist/apps   
                  cp index.html dist/
                  for dir in apps/*; do
                    if [ -d "$dir" ]; then
                      app=$(basename "$dir")
                      echo "Building $app..."                    
                      cd $dir && APP_NAME=$app npm run build -- --outDir ../../dist/apps/$app
                      cd ../..
                    fi
                  done

            - name: Setup Pages
              uses: actions/configure-pages@v5 # Beállítja a környezetet. v5 a verzió száma. Mindig használd az újabbat ebből legalábbis.

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3 # Feltölti az újonnan létrehozott 'dist' mappát.
              with:
                  path: "./dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4 # Publikálja az oldalt.
